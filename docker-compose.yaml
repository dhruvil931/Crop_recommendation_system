version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: crop_postgres
    environment:
      POSTGRES_DB: crop_recommendation_system
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ROOT
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: crop_backend
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5000:5000"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: crop_recommendation_system
      DB_USER: postgres
      DB_PASSWORD: ROOT
    restart: unless-stopped
