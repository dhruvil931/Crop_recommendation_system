spring.application.name=backend
server.port=${PORT:8080}

# =========================
# DATASOURCE
# =========================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# SSL (REQUIRED for Supabase)
spring.datasource.hikari.data-source-properties.ssl=true
spring.datasource.hikari.data-source-properties.sslmode=require

# =========================
# SQL INITIALIZATION (schema.sql + data.sql)
# =========================
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# =========================
# JPA (DO NOT TOUCH SCHEMA)
# =========================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# =========================
# HIKARI
# =========================
spring.datasource.hikari.housekeeping-period-ms=300000
spring.datasource.hikari.maximum-pool-size=10

# =========================
# JWT
# =========================
spring.app.jwtSecret=${JWT_SECRET}
spring.app.jwtExpirationMs=86400000
spring.app.jwtCookieName=cropRecommendationSystemCookie

# =========================
# FRONTEND
# =========================
frontend.url=${FRONTEND_URL}

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
otp.resend.cooldown.seconds=60
otp.expiration.minutes=1
otp.max.attempts=5
